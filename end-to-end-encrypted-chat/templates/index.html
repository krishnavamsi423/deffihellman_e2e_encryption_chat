<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>End-to-End Encrypted Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 E2E Encrypted Chat</h1>
            <div class="connection-status" id="connectionStatus">Connecting...</div>
        </div>

        <div class="main-content">
            <!-- Chat Setup Panel -->
            <div class="setup-panel" id="setupPanel">
                <div class="setup-form">
                    <h2>Start a Chat Session</h2>
                    <div class="form-group">
                        <label for="roomInput">Room Name:</label>
                        <input type="text" id="roomInput" placeholder="Enter room name (e.g., room123)" value="default">
                    </div>
                    <div class="form-group">
                        <label for="usernameInput">Your Name:</label>
                        <input type="text" id="usernameInput" placeholder="Enter your name">
                    </div>
                    <button id="joinBtn" class="btn btn-primary">Join Chat</button>
                    <div class="info-box">
                        <p><strong>Note:</strong> Share the room name with your peer to chat securely. The encryption key will be automatically exchanged.</p>
                    </div>
                </div>
            </div>

            <!-- Chat Panel -->
            <div class="chat-panel hidden" id="chatPanel">
                <div class="chat-header">
                    <div>
                        <h2 id="chatTitle">Chat Room</h2>
                        <p id="encryptionKey" class="encryption-key">Encryption Key: <span id="keyDisplay">Generating...</span></p>
                    </div>
                    <button id="leaveBtn" class="btn btn-secondary">Leave Chat</button>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <div class="welcome-message">
                        Waiting for peer to join...
                    </div>
                </div>

                <div class="message-input-area">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Type your message..." 
                        disabled
                    >
                    <button id="sendBtn" class="btn btn-primary" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.js"></script>
    <script src="{{ url_for('static', filename='crypto.min.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
